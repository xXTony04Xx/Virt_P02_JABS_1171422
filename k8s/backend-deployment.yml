apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/virtualizacionjabs1171422/repo-virtualizacion/backend:1.0
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secret   # variables del .env como Secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500           # acceso: http://localhost:30500